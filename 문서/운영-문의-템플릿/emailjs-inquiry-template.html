<!--
  EmailJS → Gmail(Contact Us) 템플릿에 붙여 넣을 본문 HTML.
  앱에서 전달하는 변수: {{subject}}, {{message}}, {{kind}}, {{reply_email}}
  (src/lib/inquiryEmailjs.ts 의 emailjs.send 필드와 이름이 일치해야 함)
-->
<div style="font-family: system-ui, -apple-system, 'Segoe UI', sans-serif, Arial; font-size: 14px; line-height: 1.55; color: #1a1a1a; max-width: 560px; margin: 0 auto;">
  <p style="margin: 0 0 16px; font-size: 13px; color: #555;">
    스팟바이브(SpotVibe) 앱에서 새 문의가 도착했습니다. 가능한 빨리 확인해 주세요.
  </p>

  <div style="border-top: 1px dashed #ccc; border-bottom: 1px dashed #ccc; padding: 16px 0; margin: 8px 0 20px;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="border-collapse: collapse;">
      <tr>
        <td style="width: 48px; vertical-align: top; padding-right: 12px;">
          <div style="background: #e8f4ff; border-radius: 8px; font-size: 22px; line-height: 44px; text-align: center; width: 44px; height: 44px;">👤</div>
        </td>
        <td style="vertical-align: top;">
          <p style="margin: 0 0 6px; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em;">문의 유형</p>
          <p style="margin: 0 0 14px; font-size: 15px; font-weight: 700; color: #0a7ea4;">{{kind}}</p>

          <p style="margin: 0 0 6px; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em;">회신 받을 메일</p>
          <p style="margin: 0 0 14px; font-size: 14px; word-break: break-all;">
            <a href="mailto:{{reply_email}}" style="color: #0a7ea4; text-decoration: none;">{{reply_email}}</a>
          </p>

          <p style="margin: 0 0 6px; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em;">제목·본문(평문)</p>
          <div style="margin: 0; padding: 12px 14px; background: #f7f7f8; border-radius: 10px; font-size: 13px; color: #333; white-space: pre-wrap; word-break: break-word;">{{message}}</div>
        </td>
      </tr>
    </table>
  </div>

  <p style="margin: 0; font-size: 11px; color: #999;">
    참고: 메일 클라이언트 제목란과 동일한 한 줄 요약은 <strong>{{subject}}</strong> 입니다.
  </p>
</div>
